services:

  # ── PostgreSQL Database ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: plomeria_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456" # Tu contraseña real de la base de datos
      POSTGRES_DB: plomeria_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - plomeria_net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d plomeria_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── NestJS Backend ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: plomeria_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: "123456" # Conexión interna correcta
      DB_NAME: plomeria_db
      JWT_SECRET: cambia_este_secreto_en_produccion_2024
      JWT_EXPIRATION: 8h
      PORT: 3000
      FRONTEND_URL: http://localhost:8080
      RECAPTCHA_SECRET_KEY: "6LeIxAcTAAAAAGG-vFI1TnRWxMZNF65pmwI_8a1m"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "3000:3000"
    networks:
      - plomeria_net
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3000/api/docs || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── React Frontend (Nginx) ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: /api
        VITE_RECAPTCHA_SITE_KEY: "6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI"
    container_name: plomeria_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    networks:
      - plomeria_net

volumes:
  postgres_data:
    name: plomeria_postgres_data

networks:
  plomeria_net:
    name: plomeria_network
    driver: bridge
