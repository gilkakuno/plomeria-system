apiVersion: v1
kind: Secret
metadata:
  name: plomeria-secrets
  namespace: plomeria
  labels:
    app: plomeria-pro
type: Opaque
data:
  # echo -n "postgres123" | base64
  DB_PASSWORD: cG9zdGdyZXMxMjM=
  # echo -n "tu_jwt_secreto_super_seguro_2024" | base64
  JWT_SECRET: dHVfand0X3NlY3JldG9fc3VwZXJfc2VndXJvXzIwMjQ=
  # echo -n "tu_recaptcha_secret" | base64
  RECAPTCHA_SECRET_KEY: dHVfcmVjYXB0Y2hhX3NlY3JldA==
  # echo -n "tu_openai_key" | base64
  OPENAI_API_KEY: dHVfb3BlbmFpX2tleQ==
