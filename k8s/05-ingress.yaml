---
# ── Ingress: Enrutamiento HTTP/HTTPS externo ─────────────────
# Requiere: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.8.2/deploy/static/provider/cloud/deploy.yaml
#
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: plomeria-ingress
  namespace: plomeria
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    # TLS / HTTPS con cert-manager (descomentar en producción):
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  # TLS (descomentar y configurar en producción):
  # tls:
  #   - hosts:
  #       - plomeria.tudominio.com
  #     secretName: plomeria-tls
  rules:
    - host: plomeria.local    # Cambiar por tu dominio en producción
      http:
        paths:
          # API → backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 3000
          # Todo lo demás → frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
