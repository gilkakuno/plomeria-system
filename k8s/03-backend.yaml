---
# ── Deployment: NestJS Backend ────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: plomeria
  labels:
    app: backend
    tier: api
spec:
  replicas: 2                    # 2 réplicas para alta disponibilidad
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate          # Zero-downtime deployment
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
        tier: api
    spec:
      # Esperar a que PostgreSQL esté listo antes de iniciar
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres-service 5432; do
                echo "Esperando PostgreSQL...";
                sleep 3;
              done
              echo "PostgreSQL listo!"

      containers:
        - name: backend
          image: plomeria-backend:latest   # Reemplazar con tu imagen de Docker Hub/ECR
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: plomeria-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: plomeria-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: plomeria-secrets
                  key: JWT_SECRET
            - name: RECAPTCHA_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: plomeria-secrets
                  key: RECAPTCHA_SECRET_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: plomeria-secrets
                  key: OPENAI_API_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/docs
              port: 3000
            initialDelaySeconds: 45
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/docs
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3

---
# ── Service: Backend (ClusterIP) ─────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: plomeria
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP

---
# ── HorizontalPodAutoscaler: Escala automática ───────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: plomeria
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
