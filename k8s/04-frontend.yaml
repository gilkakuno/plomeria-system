---
# ── Deployment: React Frontend (Nginx) ───────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: plomeria
  labels:
    app: frontend
    tier: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
        tier: web
    spec:
      containers:
        - name: frontend
          image: plomeria-frontend:latest  # Reemplazar con tu imagen
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

---
# ── Service: Frontend (LoadBalancer - expuesto al exterior) ──
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: plomeria
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer   # En local usar NodePort; en nube usar LoadBalancer
